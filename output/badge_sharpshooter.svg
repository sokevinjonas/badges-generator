<svg width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient radial -->
    <radialGradient id="grad_sharpshooter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3D9EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066E0;stop-opacity:1" />
    </radialGradient>

    <!-- Glow filter -->
    <filter id="glow_sharpshooter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow filter -->
    <filter id="shadow_sharpshooter">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>

    <!-- Shine gradient -->
    <radialGradient id="shine_sharpshooter">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer glow circle -->
  <circle cx="128" cy="128" r="116"
          fill="#0A84FF" opacity="0.4" filter="url(#glow_sharpshooter)"/>

  <!-- Main badge circle with gradient -->
  <circle cx="128" cy="128" r="108"
          fill="url(#grad_sharpshooter)"
          stroke="#FFFFFF" stroke-width="8"
          filter="url(#shadow_sharpshooter)"/>

  <!-- Inner shine effect -->
  <circle cx="113" cy="113" r="54"
          fill="url(#shine_sharpshooter)" opacity="0.25"/>

  <!-- Icon au centre -->
  <g transform="translate(78, 78) scale(0.1953125)">
    <path fill="#fff" d="M256 16S136 76 136 226v120c0 30 0 30 30 30h180c30 0 30 0 30-30V226C376 76 256 16 256 16zm0 75s60 30 60 135v60H196v-60c0-105 60-135 60-135zM148.63 420.998A12.632 12.632 0 0 0 136 433.63v49.737a12.632 12.632 0 0 0 12.63 12.63h214.74a12.632 12.632 0 0 0 12.63-12.63V433.63A12.632 12.632 0 0 0 363.37 421H148.63z"/>
  </g>
</svg>