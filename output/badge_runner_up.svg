<svg width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient radial -->
    <radialGradient id="grad_runner_up" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3D9EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066E0;stop-opacity:1" />
    </radialGradient>

    <!-- Glow filter -->
    <filter id="glow_runner_up" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow filter -->
    <filter id="shadow_runner_up">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>

    <!-- Shine gradient -->
    <radialGradient id="shine_runner_up">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer glow circle -->
  <circle cx="128" cy="128" r="116"
          fill="#0A84FF" opacity="0.4" filter="url(#glow_runner_up)"/>

  <!-- Main badge circle with gradient -->
  <circle cx="128" cy="128" r="108"
          fill="url(#grad_runner_up)"
          stroke="#FFFFFF" stroke-width="8"
          filter="url(#shadow_runner_up)"/>

  <!-- Inner shine effect -->
  <circle cx="113" cy="113" r="54"
          fill="url(#shine_runner_up)" opacity="0.25"/>

  <!-- Icon au centre -->
  <g transform="translate(78, 78) scale(0.1953125)">
    <path fill="#fff" d="M338.8 31.81c-5 19.51-9.9 38.69-14.9 57.64-45.3 7.27-90.5 7.28-135.8 0-5-18.95-9.9-38.13-14.9-57.64 54.9 22.58 110.7 22.58 165.6 0zm17.3 4.59 34.4 45.95c-14 96.25-40 204.15-77.5 302.95-10.7-12.4-25.2-21.3-41.8-24.7 28.3-111.3 56.6-212.3 84.9-324.2zm-200.2 0c28.3 111.9 56.6 212.9 84.9 324.2-16.6 3.4-31.1 12.3-41.8 24.7-37.5-98.8-63.5-206.7-77.5-302.95zM256 377c31.6 0 57 25.4 57 57s-25.4 57-57 57-57-25.4-57-57 25.4-57 57-57z"/>
  </g>
</svg>