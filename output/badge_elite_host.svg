<svg width="256" height="256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient radial -->
    <radialGradient id="grad_elite_host" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C9BDFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8A9FF;stop-opacity:1" />
    </radialGradient>

    <!-- Glow filter -->
    <filter id="glow_elite_host" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow filter -->
    <filter id="shadow_elite_host">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>

    <!-- Shine gradient -->
    <radialGradient id="shine_elite_host">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer glow circle -->
  <circle cx="128" cy="128" r="116"
          fill="#B8A9FF" opacity="0.4" filter="url(#glow_elite_host)"/>

  <!-- Main badge circle with gradient -->
  <circle cx="128" cy="128" r="108"
          fill="url(#grad_elite_host)"
          stroke="#FFFFFF" stroke-width="8"
          filter="url(#shadow_elite_host)"/>

  <!-- Inner shine effect -->
  <circle cx="113" cy="113" r="54"
          fill="url(#shine_elite_host)" opacity="0.25"/>

  <!-- Icon au centre -->
  <g transform="translate(78, 78) scale(0.1953125)">
    <path fill="#fff" d="m158.6 41 34.5 69.1L239.2 41zm114.2 0 46.1 69.1L353.4 41zM256 48.22 208.8 119h94.4zm-113.9.14L83.22 119h94.18zm227.8 0L334.6 119h94.2zM80.82 137 196.8 311H249l-63.4-174zm124.08 0L256 277.7 307.1 137zm121.5 0L263 311h52.2l116-174zM201 329v46h110v-46zm-67.8 64-53.69 94H432.5l-53.7-94H183zm26.8 46h192v18H160z"/>
  </g>
</svg>